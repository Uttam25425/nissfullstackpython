<html>
<head>
<title>Table</title>
<style>
table, th, td {
  border: 1px solid black;
  border-collapse: collapse;
  text-align: center;
  padding: 8px;
}
</style>
</head>

<body>

<h2>My Multi Level Table</h2>

<table>

<tr>
  <th rowspan="2">Column 0</th>
  <th rowspan="2">Column 1</th>
  <th colspan="2">Column 2</th>
</tr>

<tr>
  <th>Column 2a</th>
  <th>Column 2b</th>
</tr>

<tr>
  <td rowspan="2">Row 1</td>
  <td>Row 1a</td>
  <td>123</td>
  <td>456</td>
</tr>

<tr>
  <td>Row 1b</td>
  <td>123</td>
  <td>456</td>
</tr>

<tr>
  <td colspan="2">Row 2</td>
  <td>123</td>
  <td>456</td>
</tr>

</table>

</body>
</html>
