<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>

    <style>
        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Element Selector */
        p {
            color: blue;
        }

        /* ID Selector */
        #title {
            color: red;
        }

        /* Class Selector */
        .box {
            background-color: yellow;
        }

        /* Group Selector */
        h2, p {
            font-family: Arial;
        }
    </style>
</head>

<body>

    <h1 id="title">Heading using ID</h1>

    <h2>Group Selector Example</h2>

    <p>This is a paragraph (Element + Group selector)</p>

    <p class="box">This paragraph uses Class selector</p>

</body>
</html>
